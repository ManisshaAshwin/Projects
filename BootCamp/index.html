<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            border:1px solid;
            background-color: #1EE491;
            width:420px;
            height: 300px;
            padding:90px 60px;
            box-sizing: content-box;
            border-color:#1EE491;
            border-radius: 12px;
            margin:50px auto;
            font-family: sans-serif;
        }

        .heading{
            font-size: 40px;
        }

        .note{
            font-size: 16px;
        }

        button{
            width:230px;
            padding:15px;
            font-size: 17px;
            border-radius: 30px;
            border: none;
            background-color: white;
            margin-top: 10px;
        }
        
    </style>
</head>
<body>
    <div class="box">
        <h1 class="heading">Business Development</h1>
        <p class="note">Have an idea or enquiry for Waze business development?</p>
        <button>Share your ideas</button>
    </div>
</body>
</html>
